name: Build Script
permissions:
  contents: write
  actions: write 

on:
  workflow_call:
    inputs:
      android_version:
        required: true
        type: string
        default: 'android15'
      kernel_version:
        required: true
        type: string
        default: '5.15'
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      kernelsu_branch_other:
        required: false
        type: string
      revision:
        required: false
        type: string
      disable_lto:
        required: false
        type: boolean
        default: false

jobs:
  build-gki:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Maximize Build Space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-large-packages: 'true'
          remove-swapfile: 'true'
          remove-cached-tools: 'true' 
          verbose: 'true'
          
      - name: Set CONFIG Environment Variable
        run: |
          set -e  # Fail-fast
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV
          echo "CONFIG set to: $CONFIG"

      - name: Install ccache
        run: sudo apt update && sudo apt install -y ccache

      - name: Set up ccache  # Increased size for kernel builds
        run: |
          set -e
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=5G
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Cache ccache and Bazel  # New: Caching for speed
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ~/.cache/bazel
          key: kernel-cache-${{ hashFiles('**/workflow_call.inputs') }}-${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-${{ inputs.kernelsu_variant }}
          restore-keys: kernel-cache-

      - name: Download toolchain
        run: |
          set -e
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      - name: Cache Dependencies  # New: Cache clones to avoid re-fetch
        uses: actions/cache@v4
        with:
          path: |
            kernel-build-tools
            mkbootimg
            AnyKernel3
            susfs4ksu
            kernel_patches
          key: deps-cache-${{ hashFiles('**/workflow_call.inputs') }}-${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.kernelsu_variant }}

      - name: Set environment variables
        run: |
          set -e
          echo "AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool" >> $GITHUB_ENV
          echo "MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py" >> $GITHUB_ENV
          echo "UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py" >> $GITHUB_ENV

      - name: Set boot sign key
        env:
          BOOT_SIGN_KEY: ${{ secrets.BOOT_SIGN_KEY }}
        run: |
          set -e
          if [ ! -z "$BOOT_SIGN_KEY" ]; then
            echo "$BOOT_SIGN_KEY" > ./kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
            echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem" >> $GITHUB_ENV
          else
            echo "BOOT_SIGN_KEY is not set. Using AOSP sign key..."
            echo "BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem" >> $GITHUB_ENV
          fi

      - name: Install Repo
        run: |
          set -e
          mkdir -p ./git-repo
          curl https://storage.googleapis.com/git-repo-downloads/repo > ./git-repo/repo
          chmod a+rx ./git-repo/repo
          echo "REPO=$GITHUB_WORKSPACE/./git-repo/repo" >> $GITHUB_ENV

      - name: Clone AnyKernel3 and Other Dependencies  # Conditional clone if not cached
        run: |
          set -e
          ANYKERNEL_BRANCH="gki-2.0"
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"
          if [ ! -d "AnyKernel3" ]; then git clone https://github.com/WildPlusKernel/AnyKernel3.git -b "$ANYKERNEL_BRANCH"; fi
          if [ ! -d "susfs4ksu" ]; then git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"; fi
          if [ ! -d "kernel_patches" ]; then git clone https://github.com/WildPlusKernel/kernel_patches.git; fi

      - name: Cache Kernel Source  # New: Cache source to skip sync
        uses: actions/cache@v4
        id: cache-kernel-source
        with:
          path: ${{ env.CONFIG }}
          key: kernel-source-${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-${{ inputs.os_patch_level }}

      - name: Initialize and Sync Kernel Source
        if: steps.cache-kernel-source.outputs.cache-hit != 'true'  # Skip if cached
        run: |
          set -e
          mkdir -p "$CONFIG"
          cd "$CONFIG"
          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          $REPO init --depth=1 --u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16
          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml
          if grep -q deprecated <<< $REMOTE_BRANCH; then
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi
          $REPO sync -c -j$(nproc --all) --no-tags --fail-fast

      - name: Determine the branch for KernelSU  # Combined with next steps for minimization
        run: |
          set -e
          case "${{ inputs.kernelsu_branch }}" in
            "Stable") echo "BRANCH=-" >> $GITHUB_ENV ;;
            "Dev")
              if [[ "${{ inputs.kernelsu_variant }}" =~ ^(KSU|MKSU)$ ]]; then echo "BRANCH=-s main" >> $GITHUB_ENV
              elif [[ "${{ inputs.kernelsu_variant }}" == "NEXT" ]]; then echo "BRANCH=-s next" >> $GITHUB_ENV
              elif [[ "${{ inputs.kernelsu_variant }}" == "WILD" ]]; then echo "BRANCH=-s wild" >> $GITHUB_ENV
              fi ;;
            "Other")
              if [[ -n "${{ inputs.kernelsu_branch_other }}" ]]; then echo "BRANCH=-s ${{ inputs.kernelsu_branch_other }}" >> $GITHUB_ENV
              else exit 1; fi ;;
          esac

      - name: Add KernelSU and Apply Patches
        run: |
          set -e
          cd "$CONFIG"
          # Add KSU (unchanged)
          case "${{ inputs.kernelsu_variant }}" in
            "WILD") curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/wild/kernel/setup.sh" | bash ${{ env.BRANCH }} ;;
            "KSU") curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash ${{ env.BRANCH }} ;;
            "NEXT") curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash ${{ env.BRANCH }} ;;
            "MKSU") curl -LSs "https://raw.githubusercontent.com/5ec1cff/KernelSU/main/kernel/setup.sh" | bash ${{ env.BRANCH }} ;;
          esac
          # Apply SUSFS (unchanged, but conditional if needed)
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cd common
          patch -p1 --forward < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch
          cd ..
          cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          case "${{ inputs.kernelsu_variant }}" in
            "WILD") cd ./Wild_KSU ;;
            "KSU") cd ./KernelSU; cp ../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./; patch -p1 --forward < 10_enable_susfs_for_ksu.patch ;;
            "NEXT") cd ./KernelSU-Next; cp ../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./; patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true;
                    # Apply fix patches (unchanged)
                    cp ../../kernel_patches/next/susfs_fix_patches/v1.5.9/*.patch ./;
                    patch -p1 --forward < fix_apk_sign.c.patch;
                    patch -p1 --forward --fuzz=3 < fix_core_hook.c.patch;
                    patch -p1 --forward < fix_selinux.c.patch;
                    patch -p1 --forward < fix_ksud.c.patch;
                    patch -p1 --forward < fix_rules.c.patch;
                    patch -p1 --forward < fix_sucompat.c.patch;
                    patch -p1 --forward < fix_kernel_compat.c.patch ;;
            "MKSU") cd ./KernelS ;;
          esac
          # Apply Hooks (unchanged)
          cd ../common
          if [ "${{ inputs.kernelsu_variant }}" == "NEXT" ]; then
            cp ../../kernel_patches/next/scope_min_manual_hooks_v1.4.patch ./;
            patch -p1 --forward -F 3 < scope_min_manual_hooks_v1.4.patch;
          elif [ "${{ inputs.kernelsu_variant }}" == "WILD" ]; then
            cp ../../kernel_patches/wild/syscall_hooks.patch ./;
            patch -p1 --forward -F 3 < syscall_hooks.patch;
          fi
          # Apply Hide (unchanged)
          cp ../../kernel_patches/69_hide_stuff.patch ./;
          patch -p1 --forward -F 3 < 69_hide_stuff.patch

      - name: Add Configuration Settings
        run: |
          set -e
          cd "$CONFIG"
          # KSU configs (unchanged)
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [ "${{ inputs.kernelsu_variant }}" == "NEXT" ] || [ "${{ inputs.kernelsu_variant }}" == "WILD" ]; then
            echo "CONFIG_KSU_KPROBES_HOOK=n" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_WCD938X=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_WCD938X_SDW=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_WCD939X=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_WSA883X=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_WSA884X=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_LPASS_RX_MACRO=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_LPASS_TX_MACRO=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_LPASS_VA_MACRO=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_USB_AUDIO=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_USB_AUDIO_MIDI_V2=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_PCM_TIMER=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_IP6_NF_MATCH_HL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> ./common/arch/arm64/configs/gki_defconfig 
          echo "CONFIG_TCP_CONG_BBR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NET_SCH_FQ=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_BIC=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_WESTWOOD=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TCP_CONG_HTCP=n" >> ./common/arch/arm64/configs/gki_defconfig 
          echo "CONFIG_QCOM_RPMH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_SMD_RPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_SPM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_TSENS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_CPR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_LLCC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_BUS_SCALING=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_COMMAND_DB=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_GENI_SE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_GPI_DMA=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_ARM_QCOM_CPUFREQ_HW=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_KRYO_L2_ACCESSORS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SM_GCC_8550=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SM_DISPCC_8550=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SM_VIDEOCC_8550=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SM_GPUCC_8550=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SM_MDSS_8550=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_INTERCONNECT_QCOM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_INTERCONNECT_QCOM_SM8550=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_BIMC_BWMON=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_OCMEM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_HZ=1000" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_NO_HZ_FULL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CPU_FREQ_GOV_ONDEMAND=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CPU_FREQ_GOV_INTERACTIVE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_FAIR_GROUP_SCHED=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_QCOM_COMMON=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_QDSP6V2=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_SND_SOC_SM8550=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DRM_MSM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DRM_PANEL_SAMSUNG_S6E3HC3=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DRM_PANEL_SAMSUNG_S6E3HC4=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DRM_PANEL_SAMSUNG_SOFEF03=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_DRM_PANEL_VISIONOX_VTDR6130=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MSM_PIL=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MSM_PIL_SMP2P=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MSM_PIL_SMSM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MSM_SUBSYSTEM_RESTART=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MSM_QMI_INTERFACE=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MSM_MINIDUMP=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_MSM_DCC=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_IPA=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_SMEM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_SMP2P=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_SMSM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_GLINK_SMEM=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_QCOM_GLINK_SSR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
          if [ "${{ inputs.kernelsu_variant }}" == "NEXT" ] || [ "${{ inputs.kernelsu_variant }}" == "WILD" ]; then
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> ./common/arch/arm64/configs/gki_defconfig
          else
            echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: Getting KernelSU Version and Change Kernel Name 
        run: |
          set -e
          cd "$CONFIG"
          case "${{ inputs.kernelsu_variant }}" in
            "WILD"|"KSU"|"NEXT") BASE_VERSION=10200; cd ./KernelSU-Next ;;  # Adjusted path example
            "MKSU") ;;
          esac
          cd ./kernel
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" $BASE_VERSION)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          # Change name (unchanged)
          cd ../..
          if [ -f "build/build.sh" ]; then
            perl -pi -e 's/-dirty//' ./common/scripts/setlocalversion
            perl -0777 -pi -e 's/(.*)(echo "\$res")/$1echo "\$res-Next-v\$KSUVER-SUSFS-v1.5.9-Wild"/s' ./common/scripts/setlocalversion
            perl -pi -e 's{UTS_VERSION="\$\(echo \$UTS_VERSION \$CONFIG_FLAGS \$TIMESTAMP \| cut -b -\$UTS_LEN\)"}{UTS_VERSION="#1 SMP PREEMPT Sun Apr 20 04:20:00 UTC 2025"}' ./common/scripts/mkcompile_h
          else
            perl -pi -e 's/-maybe-dirty//g' ./build/kernel/kleaf/impl/stamp.bzl
            echo "CONFIG_LOCALVERSION=\"-NEXT-v$KSUVER-SUSFS-v1.5.9-Wild\"" >> ./common/arch/arm64/configs/gki_defconfig
            perl -pi -e 's/build-timestamp = \$\(or \$\(KBUILD_BUILD_TIMESTAMP\), \$\(build-timestamp-auto\)\)/build-timestamp = "Sun Apr 20 04:20:00 UTC 2025"/' ./common/init/Makefile
            rm -rf ./common/android/abi_gki_protected_exports_*
            perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' ./common/BUILD.bazel
          fi

      - name: Build
        run: |
          set -e
          cd "$CONFIG"
          LTO_FLAG="--lto=thin"
          OPT_FLAGS="--copt=-O3 --copt=-march=armv9-a+crc+crypto --copt=-mtune=cortex-x3"
          if [[ "$DISABLE_LTO" == "true" ]]; then 
            LTO_FLAG=""
          fi
          if [ -f "build/build.sh" ]; then
            export MAKEFLAGS="-j$(nproc --all)"
            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang" || exit 1
          else
            tools/bazel build --disk_cache=/home/runner/.cache/bazel --config=fast $LTO_FLAG $OPT_FLAGS --jobs=$(nproc --all) //common:kernel_aarch64_dist || exit 1 
          fi
          ccache --show-stats
        env:
          DISABLE_LTO: ${{ inputs.disable_lto }}

      - name: Create ZIP Files for Different Formats
        run: |
          set -e
          # Copy images from dist to root
          cp "$CONFIG/out/android13-5.15/dist/Image" .
          cp "$CONFIG/out/android13-5.15/dist/Image.lz4" .
          cp "$CONFIG/out/android13-5.15/dist/Image.gz" .
          cd ./AnyKernel3
          ZIP_NAME="${{ inputs.kernelsu_variant }}-$KSUVER-${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-AnyKernel3.zip"
          mv ../Image ./Image
          zip -r "../$ZIP_NAME" ./*
          rm ./Image
          ZIP_NAME="${{ inputs.kernelsu_variant }}-$KSUVER-${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-AnyKernel3-lz4.zip"
          mv ../Image.lz4 ./Image.lz4
          zip -r "../$ZIP_NAME" ./*
          rm ./Image.lz4
          ZIP_NAME="${{ inputs.kernelsu_variant }}-$KSUVER-${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-AnyKernel3-gz.zip"
          mv ../Image.gz ./Image.gz
          zip -r "../$ZIP_NAME" ./*
          rm ./Image.gz
          
      - name: Android 13/14/15 boot image build script
        if: ${{ inputs.android_version == 'android13' || inputs.android_version == 'android14' || inputs.android_version == 'android15' }}
        run: |
          set -e
          # Create bootimgs directory and copy Image files to it
          mkdir -p bootimgs
          cp Image bootimgs/
          cp Image.lz4 bootimgs/
          cd bootimgs
          # Create gzip of the Image file
          gzip -n -k -f -9 ./Image > ./Image.gz
          echo "Building boot.img"
          $MKBOOTIMG --header_version 4 --kernel Image --output boot.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot.img ../${{ inputs.kernelsu_variant }}-$KSUVER-${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot.img
          echo "Building boot-gz.img"
          $MKBOOTIMG --header_version 4 --kernel Image.gz --output boot-gz.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-gz.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-gz.img ../${{ inputs.kernelsu_variant }}-$KSUVER-${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-gz.img
          echo "Building boot-lz4.img"
          $MKBOOTIMG --header_version 4 --kernel Image.lz4 --output boot-lz4.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-lz4.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-lz4.img ../${{ inputs.kernelsu_variant }}-$KSUVER-${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-lz4.img
          
      - name: Compress all img files with gzip
        run: |
          set -e
          for image in *.img; do
            gzip -vnf9 "$image"
          done

      - name: Cleanup  # New: Free space post-build
        if: always()  # Run even on failure
        run: rm -rf out/ bazel-bin/ $CONFIG/temp/  # Adjust paths as needed
  
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.kernelsu_variant }}-kernel-${{ env.CONFIG }}
          path: |
            *.zip
            *.img.gz
            *Image*
